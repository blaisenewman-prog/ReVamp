<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wriddle — After</title><style>:root{--ink:#17201d;--muted:#65706b;--paper:#f4f1e8;--card:#fffdf7;--line:#d9d5c9;--accent:#1f684f;--soft:#e4eee8;--danger:#a33a2f;--shadow:0 24px 70px rgba(23,32,29,.12)}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.5 Inter,system-ui,sans-serif}.shell{width:min(100% - 28px,1050px);margin:auto}.head{display:flex;justify-content:space-between;align-items:center;padding:20px 0}.brand{font:800 28px Georgia,serif;text-decoration:none}.mark{display:inline-grid;place-items:center;width:32px;height:32px;margin-right:8px;border:2px solid;border-radius:50%;font:700 16px system-ui}.head button{border:0;background:transparent;font-weight:700}.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:64px;align-items:center;min-height:calc(100vh - 76px);padding:40px 0 70px}.eyebrow{color:#174c3b;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1{margin:12px 0 0;font:700 clamp(54px,8vw,100px)/.88 Georgia,serif;letter-spacing:-.07em}.intro{max-width:560px;color:var(--muted);font-size:18px}.pills{display:flex;flex-wrap:wrap;gap:9px}.pill{padding:8px 11px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-weight:700}.card{position:relative;padding:36px;border:1px solid rgba(23,32,29,.1);border-radius:28px;background:var(--card);box-shadow:var(--shadow);overflow:hidden}.card:before{content:'?';position:absolute;right:-10px;top:-50px;color:var(--soft);font:800 170px Georgia,serif}.content{position:relative}.label{color:var(--muted);font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.riddle{font:700 28px/1.3 Georgia,serif}.row{display:flex;gap:9px}input{min-width:0;width:100%;padding:14px;border:1px solid #b9beb9;border-radius:12px;font:inherit}button.primary{padding:14px 18px;border:0;border-radius:12px;background:var(--accent);color:white;font-weight:800}.status{min-height:24px;color:var(--muted);font-weight:700}.ok{color:var(--accent)}.bad{color:var(--danger)}@media(max-width:760px){.hero{grid-template-columns:1fr;gap:35px;min-height:auto}.row{display:grid}button.primary{width:100%}.card{padding:25px}}</style></head><body><header class="shell head"><a class="brand" href="#"><span class="mark">?</span>Wriddle</a><button type="button">How to play</button></header><main class="shell hero"><div><p class="eyebrow">One question. Every day.</p><h1>Think it through.</h1><p class="intro">A fresh daily riddle, designed to give your brain a small challenge without taking over your day.</p><div class="pills"><span class="pill">New daily</span><span class="pill" id="countdown">Next riddle in --:--:--</span></div></div><section class="card"><div class="content"><p class="label">Today's Wriddle</p><p class="riddle">What has keys but cannot open locks?</p><form id="form"><label for="answer"><b>Your answer</b></label><div class="row"><input id="answer" autocomplete="off" placeholder="Type your answer"><button class="primary">Check answer</button></div></form><p class="status" id="status"></p></div></section></main><script>const form=document.querySelector('#form'),answer=document.querySelector('#answer'),status=document.querySelector('#status');form.addEventListener('submit',e=>{e.preventDefault();const good=answer.value.trim().toLowerCase().includes('keyboard')||answer.value.trim().toLowerCase()==='piano';status.textContent=good?'You got it. Come back tomorrow for the next Wriddle.':'Not quite. Think it through and try again.';status.className='status '+(good?'ok':'bad')});function tick(){const n=new Date(),end=new Date(n);end.setHours(24,0,0,0);let s=Math.max(0,Math.floor((end-n)/1000));const h=String(Math.floor(s/3600)).padStart(2,'0'),m=String(Math.floor(s%3600/60)).padStart(2,'0'),x=String(s%60).padStart(2,'0');document.querySelector('#countdown').textContent=`Next riddle in ${h}:${m}:${x}`}tick();setInterval(tick,1000);</script></body></html>
