<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f3f1e9">
  <meta name="description" content="A simple, playable T-Rex Runner first-rendition concept by PestoAi.">
  <title>T-Rex Runner — PestoAi First Rendition</title>
  <link rel="icon" href="assets/dino-mark.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css?v=2">
  <script src="script.js?v=2" defer></script>
</head>
<body>
  <a class="skip-link" href="#game">Skip to game</a>

  <header class="site-header">
    <a class="brand" href="#game" aria-label="T-Rex Runner home">
      <img src="assets/dino-mark.svg" width="36" height="36" alt="">
      <span><strong>T-Rex</strong> Runner</span>
    </a>

    <div class="header-actions">
      <button class="small-button" id="soundButton" type="button" aria-pressed="false" aria-label="Turn sound on">Sound <strong id="soundState">off</strong></button>
      <button class="small-button" id="themeButton" type="button" aria-pressed="false" aria-label="Switch to night mode">Mode <strong id="themeState">day</strong></button>
    </div>
  </header>

  <main id="game">
    <section class="game-shell" aria-labelledby="gameTitle">
      <h1 id="gameTitle" class="sr-only">T-Rex Runner game</h1>

      <div class="scorebar" aria-label="Game scores">
        <div><span>Score</span><strong id="scoreValue">00000</strong></div>
        <div><span>Best</span><strong id="bestValue">00000</strong></div>
        <div><span>Speed</span><strong id="speedValue">1.0×</strong></div>
      </div>

      <div class="game-stage" id="gameStage">
        <canvas id="gameCanvas" width="1200" height="400" aria-label="Playable T-Rex endless runner"></canvas>

        <div class="game-overlay" id="startOverlay">
          <img src="assets/dino-mark.svg" width="58" height="58" alt="">
          <h2>Press space or tap to start</h2>
          <p>Jump the cacti. Duck under birds.</p>
          <button class="primary-button" id="startButton" type="button">Start</button>
        </div>

        <div class="game-overlay" id="gameOverOverlay" hidden>
          <p class="small-label">RUN OVER</p>
          <h2>Score <span id="finalScore">00000</span></h2>
          <p id="gameOverMessage">Try another run.</p>
          <button class="primary-button" id="restartButton" type="button">Run again</button>
        </div>
      </div>

      <div class="mobile-controls" aria-label="Touch controls">
        <button id="duckButton" type="button">↓ Duck</button>
        <button id="jumpButton" type="button">↑ Jump</button>
      </div>

      <p class="controls-line"><kbd>SPACE</kbd> or <kbd>↑</kbd> jump · <kbd>↓</kbd> duck · <kbd>R</kbd> restart</p>
    </section>
  </main>

  <footer>
    <span>First-rendition concept, not a final product.</span>
    <a href="https://pestoai.net/#designed" target="_blank" rel="noopener">PestoAi ↗</a>
  </footer>
</body>
</html>
